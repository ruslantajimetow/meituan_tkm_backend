worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Keep upstream connections alive
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    server {
        # so_keepalive: send TCP keepalive probes every 30s, retry every 10s, drop after 3 failures
        # This prevents VPS firewalls/NAT from silently dropping idle TCP connections
        listen 80 so_keepalive=30s:10s:3;

        # Long timeout for WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Required for WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # TCP keepalive through nginx
            proxy_socket_keepalive on;
        }
    }
}
